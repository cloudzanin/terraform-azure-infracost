name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Setup tfsec
        uses: aquasecurity/tfsec-action@v1.0.3

      - name: Write terraform.tfvars.json from secrets
        shell: bash
        run: |
          cat > terraform.tfvars.json <<'EOF'
          {
            "azure_subscription_id": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          }
          EOF

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate -no-color

      - name: TFLint
        run: tflint --no-color

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          additional_args: --no-color

  infracost:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost breakdown (root Terraform)
        run: infracost breakdown --path . --format json --out-file infracost.json

      - name: Infracost PR comment
        uses: infracost/actions/comment@v3
        with:
          path: infracost.json
          behavior: update

  deploy:
    needs: validate
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Write terraform.tfvars.json from secrets
        shell: bash
        run: |
          cat > terraform.tfvars.json <<'EOF'
          {
            "azure_subscription_id": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          }
          EOF

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -no-color -auto-approve tfplan