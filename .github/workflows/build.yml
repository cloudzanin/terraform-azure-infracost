name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Setup tfsec
        uses: aquasecurity/tfsec-action@v1.0.3

      - name: Write terraform.tfvars.json from secrets
        shell: bash
        run: |
          cat > terraform.tfvars.json <<'EOF'
          {
            "azure_subscription_id": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          }
          EOF

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate -no-color

      - name: TFLint
        run: tflint --no-color

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          additional_args: --no-color

  infracost:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v2
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost breakdown (root Terraform)
        run: infracost breakdown --path . --format json --out-file infracost.json

      - name: Infracost PR comment
        uses: infracost/actions/comment@v2
        with:
          path: infracost.json
          behavior: update