name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to confirm destroying all Terraform-managed resources"
        required: true
        default: "NO"

jobs:
  destroy:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURECREDENTIALS }}

    - name: Write terraform.tfvars.json from secrets
      shell: bash
      run: |
        cat > terraform.tfvars.json <<'EOF'
        {
          "azure_subscription_id": "${{ fromJSON(secrets.AZURECREDENTIALS).subscriptionId }}"
        }
        EOF

    - name: Terraform init
      run: terraform init

    - name: Terraform destroy
      run: terraform destroy -no-color -auto-approve
