name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to confirm destroying all Terraform-managed resources"
        required: true
        default: "NO"

jobs:
  destroy:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Write terraform.tfvars.json from secrets
      shell: bash
      run: |
        cat > terraform.tfvars.json <<'EOF'
        {
          "azure_subscription_id": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
        }
        EOF

    - name: Terraform init
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
          -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
          -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
          -backend-config="key=${{ secrets.TF_BACKEND_KEY }}" \
          -backend-config="use_azuread_auth=true"

    - name: Terraform destroy
      run: terraform destroy -no-color -auto-approve
